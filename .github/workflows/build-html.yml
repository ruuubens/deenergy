name: Build HTML from API

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  workflow_dispatch:
  schedule:
    # 05:15 UTC = 06:15 CET / 07:15 CEST
    - cron: "15 5 * * *"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  fetch-api:
    runs-on: ubuntu-latest
    steps:
      - name: Fetch API data
        run: |
          curl -sS "https://api.energy-charts.info/signal?country=de&postal_code=80339" -o api_response.json
      - name: Upload API data
        uses: actions/upload-artifact@v7
        with:
          name: api-data
          path: api_response.json

  build-html:
    runs-on: ubuntu-latest
    needs: fetch-api
    steps:
      - uses: actions/checkout@v6
      - name: Download API data
        uses: actions/download-artifact@v8
        with:
          name: api-data
          path: ./data
      - name: Build HTML
        run: |
          python3 scripts/build_html.py --input ./data/api_response.json --output ./dist/de_renewable_signal.html --postal-code 80339
          cp ./dist/de_renewable_signal.html ./dist/index.html
      - name: Upload HTML artifact
        uses: actions/upload-artifact@v7
        with:
          name: html-page
          path: ./dist/de_renewable_signal.html
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

  deploy-pages:
    runs-on: ubuntu-latest
    needs: build-html
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
